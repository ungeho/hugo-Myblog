{{- $headers := findRE "<h[2-4][^>]*id=" .Content -}}
{{- if gt (len $headers) 0 -}}
<div class="toc toc-card" data-toc-card>
    <details {{ if (.Param "TocOpen") }}open{{ end }} data-toc-details>
        <summary accesskey="c" title="(Alt + C)">
            <span class="details">{{- i18n "toc" | default "Table of Contents" }}</span>
        </summary>
        <div class="inner">
            {{- .TableOfContents -}}
        </div>
    </details>
</div>
{{- end }}
