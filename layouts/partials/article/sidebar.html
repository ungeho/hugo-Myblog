{{- $headers := findRE "<h[2-4][^>]*id=" .Content -}}
{{- $showToc := and (.Param "ShowToc") (gt (len $headers) 0) -}}
{{- if $showToc }}
<aside class="article-sidebar" aria-label="Article navigation">
  <div class="article-sidebar-inner">
    <div class="reading-progress-card">
      <div class="reading-progress-label">
        <span>Reading progress</span>
        <span class="reading-progress-value" data-reading-progress-value>0%</span>
      </div>
      <div class="reading-progress-track" aria-hidden="true">
        <span class="reading-progress-bar" data-reading-progress-bar></span>
      </div>
    </div>
    <div class="article-jump-nav" data-article-jump-nav hidden></div>
    {{- partial "toc.html" . }}
  </div>
</aside>
{{- end }}
