{{- $tone := lower (.Get "tone" | default (.Get "color") | default (.Get 0) | default "soft") -}}
{{- $allowed := slice "soft" "pink" "mint" "blue" "yellow" "lavender" "dark" -}}
{{- if not (in $allowed $tone) -}}
  {{- $tone = "soft" -}}
{{- end -}}
<span class="article-badge article-badge-{{ $tone }}">{{ .Inner | markdownify }}</span>
