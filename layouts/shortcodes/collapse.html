{{ if .Get "summary" }}
{{ else }}
{{ warnf "missing value for param 'summary': %s" .Position }}
{{ end }}
<div class="collapse-panel">
  <details {{ if (eq (.Get "openByDefault") true) }}open{{ end }}>
    <summary markdown="span">{{ .Get "summary" | markdownify }}</summary>
    <div class="collapse-panel-body">
      {{ .Inner | markdownify }}
    </div>
  </details>
</div>
