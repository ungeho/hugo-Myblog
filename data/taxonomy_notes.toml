[series.overview]
eyebrow = "Series Index"
description = "連続して読めるテーマごとのまとまりです。技術メモ、ゲーム設定、ブログ改善ログをシリーズ単位で追いやすくしています。"

[series."コンピューターで計算する"]
description = "数値計算や誤差、微分積分の近似など、コンピューター上で数を扱うときの考え方を整理したシリーズです。"

[series."FFXIV Splatoon Presets"]
description = "FFXIV の各コンテンツ向け Splatoon preset を、導入時に見返しやすい個人メモとしてまとめています。アルカディア零式を含む各種コンテンツの preset をこのシリーズに統合しています。"

[series."FFXIV Raid Notes"]
description = "攻略時の補助メモ、座標、設定、ツール運用などを静かに蓄積していくシリーズです。"

[series."FFXIV Waymark Presets"]
description = "Waymark Preset Plugin で使える FFXIV 向けフィールドマーカープリセットを、導入方法・画像・コードと一緒に見返しやすく整理していくシリーズです。"

[series."数学とプログラミング"]
description = "図形や数式の面白さを、コードとしてどう扱うかまで含めて整理するシリーズです。"

[series."League of Legends Notes"]
description = "League of Legends のチャンピオン理解や個人用メモを、あとから見返しやすい形で残すシリーズです。"

[series."思考メモ"]
description = "雑記や考えごとを、少しだけ論点が追いやすい形で残しておくシリーズです。"

[series."Blog Customization"]
description = "このブログで試した装飾、shortcode、デザイン改善を確認するためのシリーズです。"

[series."AI補助で開発したアプリの紹介"]
description = "AI補助で開発したアプリを、作った理由、設計の考え方、使いどころとあわせて紹介していくシリーズです。"

[categories.overview]
