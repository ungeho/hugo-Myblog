      url = "/archives/"
      weight = 15
    [[languages.en.menu.main]]
      identifier = "search"
      name = "Search"
      url = "/search/"
      weight = 20
    [[languages.en.menu.main]]
      identifier = "categories"
      name = "Categories"
      url = "/categories/"
      weight = 25
    [[languages.en.menu.main]]
      identifier = "series"
      name = "Series"
      url = "/series/"
      weight = 27
    [[languages.en.menu.main]]
      identifier = "tags"
      name = "Tags"
      url = "/tags/"
      weight = 30

[related]
    includeNewer = true
    threshold = 20
    toLower = true

    [[related.indices]]
        name = "series"
        weight = 120

    [[related.indices]]
        name = "tags"
        weight = 100

    [[related.indices]]
        name = "categories"
        weight = 80
