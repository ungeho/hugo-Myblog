      [languages.en.params.profileMode]
        subtitle = "an online game-loving nerd"
        lead = "A quiet place for game notes, things that caught my attention, and personal memos worth revisiting later."
    [[languages.en.menu.main]]
      identifier = "about"
      name = "About"
      url = "/about/"
      weight = 5
    [[languages.en.menu.main]]
      identifier = "posts"
      name = "Posts"
      url = "/posts/"
      weight = 10
    [[languages.en.menu.main]]
      identifier = "archives"
