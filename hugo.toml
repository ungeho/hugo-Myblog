baseURL = 'https://ungeho.netlify.app/'
languageCode = "ja"
defaultContentLanguage = "ja"
defaultContentLanguageInSubdir = false
hasCJKLanguage = true
title = 'ungehoBlog'
theme = 'PaperMod'

[taxonomies]
tag = "tags"
category = "categories"
series = "series"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[params]
    title = 'ungehoBlog'
    description = 'ungeho'
    author = 'ungeho'
    DateFormat = "2006/01/02"
    defaultTheme = 'auto'
    displayFullLangName = true
    # postsフォルダ内を記事一覧として扱う
    mainSections = ["posts"]

    ShowReadingTime = true
    ShowShareButtons = true
    ShareButtons = ["x"]

    ShowPostNavLinks = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    disableThemeToggle = false
    disableScrollToTop = false
    comments = false

    math = true

    [params.assets]
        favicon = "favicon.ico"
        favicon16x16 = "favicon/favicon-16x16.png"
        favicon32x32 = "favicon/favicon-32x32.png"
        apple_touch_icon = "favicon/apple-touch-icon.png"

    [params.profileMode]
        enabled = true
        title = "Ungeho"
        subtitle = "ネトゲ大好きおたく"
        lead = "ゲームのこと、気になったこと、あとで見返したいメモを、やわらかく整理して残していく場所です。"
        imageUrl = "profile.png"
        imageWidth = 256
        imageHeight = 256

    footerTagline = "ネトゲが趣味の人の個人ブログ"

    # [[params.profileMode.buttons]]
    #     name = "Posts"
    #     url = "/posts"

    # [[params.profileMode.buttons]]
    #     name = "Github"
    #     url = "https://github.com/ungeho"

    # [[params.socialIcons]]
    #     name = "x"
    #     url = "https://x.com/"

    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/ungeho"

[markup]
    [markup.highlight]
        noClasses = false

[outputs]
home = ["HTML", "RSS", "JSON"]

[languages]
  [languages.ja]
    languageCode = "ja-JP"
    languageName = "日本語"
    title = "ungehoBlog"
    weight = 1
    [languages.ja.params]
      description = "ungeho"
      languageAltTitle = "Japanese"
      footerTagline = "ネトゲが趣味の人の個人ブログ"
      [languages.ja.params.profileMode]
        subtitle = "ネトゲ大好きおたく"
        lead = "ゲームのこと、気になったこと、あとで見返したいメモを、やわらかく整理して残していく場所です。"
    [[languages.ja.menu.main]]
      identifier = "about"
      name = "About"
      url = "/about/"
      weight = 5
    [[languages.ja.menu.main]]
      identifier = "posts"
      name = "Posts"
      url = "/posts/"
